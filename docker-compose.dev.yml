version: "3"

networks:
  backend-net:
    driver: bridge
    internal: true
  frontend-net:
    driver: bridge

volumes:
    nginx-log:
      driver: local


services:

  gateway:
    image: nginxinc/nginx-unprivileged:alpine3.23-perl
    restart: on-failure
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-log:/var/log/nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - frontend-net
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/catalog"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 30M

  backend:
    build: ./backend
    restart: on-failure
    networks:
      - backend-net
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 100M

  frontend:
    build: ./frontend
    restart: on-failure
    networks:
      - frontend-net
      - backend-net
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 25M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/catalog"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

    depends_on:
      backend:
        condition: service_healthy
              
