upstream backend {
    server backend:8081;
}

server {

    listen 80;

    root /usr/share/nginx/html;

    location / {

        try_files $uri $uri/ index.html;
    }


    location /products/ {

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_pass http://backend/products;
    }

    location /categories/ {
        
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_pass http://backend/categories;
    }

    location /orders/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_pass http://backend/orders;
    }

    location /auth/whoami/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_pass http://backend/auth/whoami;  
    }
}